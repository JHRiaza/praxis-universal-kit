name: Build PRAXIS Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install customtkinter pyinstaller
      - run: pyinstaller desktop/build.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: praxis-desktop-windows
          path: dist/praxis-desktop.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tkinter (macOS)
        run: brew install python-tk@3.12
      - run: pip install customtkinter pyinstaller
      - run: pyinstaller desktop/build.spec --noconfirm --clean
      - name: List dist contents (debug)
        run: find dist -type f | head -30
      - name: Create .dmg from .app bundle
        run: |
          # PyInstaller on macOS with console=False creates an .app bundle
          APP_PATH=$(find dist -name "*.app" -maxdepth 2 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found, checking for flat binary..."
            ls -la dist/
            exit 1
          fi
          echo "Found app: $APP_PATH"
          mkdir -p dist/dmg
          cp -r "$APP_PATH" "dist/dmg/PRAXIS Kit.app"
          hdiutil create -volname "PRAXIS Kit" -srcfolder dist/dmg -ov -format UDZO dist/PRAXIS-Kit-macOS-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: praxis-desktop-macos-arm64
          path: dist/PRAXIS-Kit-macOS-arm64.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: praxis-desktop-windows
          path: ./artifacts/windows/
      - uses: actions/download-artifact@v4
        with:
          name: praxis-desktop-macos-arm64
          path: ./artifacts/macos/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/windows/praxis-desktop.exe
            ./artifacts/macos/PRAXIS-Kit-macOS-arm64.dmg
