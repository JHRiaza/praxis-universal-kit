name: Build PRAXIS Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install customtkinter pyinstaller
      - run: pyinstaller desktop/build.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: praxis-desktop-windows
          path: dist/praxis-desktop.exe

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tkinter (macOS)
        run: brew install python-tk@3.12
      - run: pip install customtkinter pyinstaller
      - name: Build with PyInstaller
        run: pyinstaller desktop/build.spec --noconfirm --clean
      - name: Create macOS .app bundle and .dmg
        run: |
          mkdir -p "dist/PRAXIS Kit.app/Contents/MacOS"
          mkdir -p "dist/PRAXIS Kit.app/Contents/Resources"
          cp dist/praxis-desktop "dist/PRAXIS Kit.app/Contents/MacOS/PRAXIS Kit"
          chmod +x "dist/PRAXIS Kit.app/Contents/MacOS/PRAXIS Kit"
          cat > "dist/PRAXIS Kit.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>PRAXIS Kit</string>
            <key>CFBundleDisplayName</key><string>PRAXIS Kit</string>
            <key>CFBundleIdentifier</key><string>com.praxis-kit.desktop</string>
            <key>CFBundleVersion</key><string>0.10.0</string>
            <key>CFBundleShortVersionString</key><string>0.10.0</string>
            <key>CFBundleExecutable</key><string>PRAXIS Kit</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          codesign --force --deep -s - "dist/PRAXIS Kit.app"
          hdiutil create -volname "PRAXIS Kit" -srcfolder "dist/PRAXIS Kit.app" -ov -format UDZO dist/PRAXIS-Kit-macOS-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: praxis-desktop-macos-arm64
          path: dist/PRAXIS-Kit-macOS-arm64.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: praxis-desktop-windows
          path: ./artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: praxis-desktop-macos-arm64
          path: ./artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          body: |
            ## PRAXIS Kit Desktop v0.10.0 — Scientific Integrity Update

            **This release addresses all critical findings from the Cowork scientific foundation audit.**

            ### MUST fixes (all resolved):
            - **M1: Schema v0.3** — Corrected enums (obs/passive instead of A/B), added all undocumented fields (field_provenance, capture_mode, passive_capture, etc.)
            - **M2: L1-R source tracking** — New `l1r_source` field: "observed" | "derived" | "mixed" | "unknown". Derived values are flagged and should not be analyzed as Likert-scale data.
            - **M3: Fixed `_derive_condition()` crash** — NameError in manual log path resolved
            - **M4: `autonomous` default documented** — Schema now states passive capture defaults to true regardless of actual autonomy
            - **M5: Governance capture verified** — End-to-end tested: `praxis incident` → governance.jsonl → export → round-trip ✅
            - **M6: `reliability_score` renamed** — Now `provenance_completeness` (reliability_score kept as deprecated alias). Measures capture completeness, NOT data quality.
            - **M7: Consent forms corrected** — "Pseudonymization" (not "anonymization") in both EN and ES consent forms

            ### Also includes:
            - Git pre-flight check (no macOS CLT popup)
            - Timezone capture in state.json
            - `git_unavailable` flag in git telemetry

            ### Downloads
            - **Windows**: `praxis-desktop.exe` — download and run, no install needed
            - **macOS (Apple Silicon)**: `PRAXIS-Kit-macOS-arm64.dmg` — open, drag to Applications

            ### Requirements
            - No Python installation needed — binaries are self-contained
            - macOS: May need to right-click → Open on first launch (unsigned app)
            - Git is optional — if not installed, git tracking is disabled gracefully
          files: |
            ./artifacts/praxis-desktop.exe
            ./artifacts/PRAXIS-Kit-macOS-arm64.dmg
