name: Build PRAXIS Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install customtkinter pyinstaller
      - run: pyinstaller desktop/build.spec --noconfirm --clean
      - uses: actions/upload-artifact@v4
        with:
          name: praxis-desktop-windows
          path: dist/praxis-desktop.exe

  build-macos:
    runs-on: macos-14  # Apple Silicon (M1)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install customtkinter pyinstaller
      - run: pyinstaller desktop/build.spec --noconfirm --clean
      - name: Create .dmg
        run: |
          mkdir -p dist/dmg
          cp -r dist/praxis-desktop.app dist/dmg/PRAXIS\ Kit.app
          hdiutil create -volname "PRAXIS Kit" -srcfolder dist/dmg -ov -format UDZO dist/PRAXIS-Kit-macOS-arm64.dmg
      - uses: actions/upload-artifact@v4
        with:
          name: praxis-desktop-macos-arm64
          path: dist/PRAXIS-Kit-macOS-arm64.dmg

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: praxis-desktop-windows
          path: ./artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: praxis-desktop-macos-arm64
          path: ./artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/praxis-desktop.exe
            ./artifacts/PRAXIS-Kit-macOS-arm64.dmg
